<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Life Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Wendy+One&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Video Player -->
        <div id="videoPlayer" class="video-player">
            <video id="mainVideo" controls autoplay>
                Your browser does not support video playback.
            </video>
            <div class="video-controls">
                <button id="stopVideoBtn">Stop Video</button>
                <button id="skipVideoBtn">Skip</button>
            </div>
        </div>

        <!-- Display View -->
        <div id="displayView" class="calendar-display">
            <div class="calendar-header">
                <div class="calendar-title">CHILD LIFE CALENDAR</div>
                <div class="month-title" id="monthTitle">APRIL</div>
                <div class="week-dates" id="weekDates">April 13 - April 17, 2024</div>
                <div class="qr-code" id="qrCode">
                    <div class="qr-content">
                        📱<br>
                        QR Code<br>
                        Placeholder
                    </div>
                </div>
            </div>
            
            <!-- Rotating display screens are rendered here by JavaScript -->
            <div class="calendar-body" id="calendarBody"></div>
        </div>

        <!-- Editor View -->
        <div id="editorView" class="editor-view">
            <div class="editor-header">
                <div class="editor-title">Weekly Schedule Events Editor</div>
                <div class="tab-buttons">
                    <button id="eventsTab" class="tab-button active">Events Editor</button>
                    <button id="videosTab" class="tab-button">Video Schedule</button>
                </div>
                <div class="month-selector">
                    <label for="monthSelect">Colors:</label>
                    <select id="monthSelect">
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4" selected>April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                    <label for="weekPicker">Week Start:</label>
                    <input type="date" id="weekPicker">
                    <label for="rotationSeconds">Seconds per screen:</label>
                    <input type="number" id="rotationSeconds" min="3" max="600" step="1" value="15">
                </div>
            </div>

            <!-- Events Editor Tab -->
            <div id="eventsEditorTab" class="editor-body">
                <!-- Monday through Friday columns will be generated here -->
            </div>

            <!-- Video Schedule Tab -->
            <div id="videoEditorTab" class="video-editor">
                <div class="video-header">
                    <h2>Video Schedule Editor</h2>
                    <div class="folder-selection">
                        <label>Video Server:</label>
                        <div class="folder-display" id="folderDisplay">Checking server...</div>
                        <button type="button" class="btn-secondary" id="refreshVideosBtn">Refresh Videos</button>
                    </div>
                </div>

                <div class="video-grid" id="videoGrid">
                    <!-- Video schedule grid will be generated here -->
                </div>
            </div>

            <div class="controls">
                <button id="toggleQR" class="btn-secondary">Turn QR Code on</button>
                <button id="saveBtn" class="btn-primary">SAVE</button>
                <button id="resetBtn" class="btn-danger">RESET</button>
                <button id="loadBtn" class="btn-secondary">LOAD</button>
                <button id="saveVideosBtn" class="btn-success" style="display:none;">SAVE VIDEOS</button>
                <button id="displayBtn" class="btn-primary">DISPLAY CALENDAR</button>
            </div>
        </div>
    </div>

    <!-- Notification System -->
    <div id="notification" class="notification"></div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="app-server-version.js"></script>
</body>
</html>
